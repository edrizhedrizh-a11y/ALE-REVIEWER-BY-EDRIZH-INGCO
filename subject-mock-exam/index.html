<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALE Subject / Range Mock Exam</title>
<style>
:root{
  --bg:#f4f0e8;--card:#fffdf8;--line:#ded6c8;--text:#061426;--muted:#667085;
  --green:#064d2d;--red:#9b1c1c;--gold:#b9892f;--blue:#061a38;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);padding:18px}
.wrap{max-width:1180px;margin:0 auto}
.hero,.panel,.booklet,.sheet,.results{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 24px rgba(0,0,0,.045)}
.hero,.panel,.results{padding:22px 26px;margin-bottom:14px}
.booklet,.sheet{padding:18px}
h1{margin:10px 0 6px;font-size:28px;letter-spacing:.04em}
h2{margin:0 0 10px}
.mini{color:var(--muted);font-size:13px;line-height:1.45}
.optionsGrid{display:grid;grid-template-columns:1.2fr .7fr .7fr 1fr;gap:12px;align-items:end}
label{font-weight:900;font-size:14px}
select,input{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit;min-height:46px}
.btn{border:1px solid var(--line);border-radius:999px;background:#fff;padding:11px 15px;font-weight:900;cursor:pointer;text-decoration:none;color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.danger{color:var(--red)}
.topActions,.navBtns,.reviewControls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.warning{margin-top:12px;padding:12px;border:1px solid #ead39a;background:#fff7df;border-radius:14px}
.examShell{display:none}
.examTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap}
.examLayout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px;align-items:start}
.qMeta{display:flex;gap:8px;flex-wrap:wrap}
.pill,.subjectBadge{display:inline-flex;border-radius:999px;background:#eee8dc;padding:8px 12px;font-weight:900;font-size:13px;margin:2px}
.subjectBadge.good{background:#f0fff7;color:#064d2d}.subjectBadge.warn{background:#fff4df;color:#7a520f}
.question{font-size:25px;font-weight:1000;line-height:1.35;margin:18px 0}
.visualBox{margin:12px 0;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px;display:none}
.visualBox.show{display:block}
.visualBox img{max-width:100%;border-radius:12px;display:block}
.choices{display:grid;gap:10px}
.choice{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:16px;background:#fff;min-height:62px;font-weight:900;line-height:1.35;cursor:pointer}
.choice input{width:24px;height:24px;flex:0 0 auto}
.choice.selected{outline:3px solid var(--blue)}
.sheet{position:sticky;top:12px;max-height:calc(100vh - 24px);overflow:auto}
.sheetRow{display:grid;grid-template-columns:52px repeat(4,1fr);gap:8px;align-items:center;margin:8px 0;border:1px solid var(--line);border-radius:14px;padding:8px;background:#fff}
.sheetRow.current{outline:3px solid var(--blue)}
.bubble{border:1px solid var(--line);border-radius:999px;padding:8px;text-align:center;font-weight:1000;background:#fff;cursor:pointer}
.bubble.on{background:var(--blue);color:#fff}
.progressBar{height:10px;background:#eee8dc;border-radius:99px;overflow:hidden;margin:10px 0}
.progressFill{height:100%;background:var(--green);width:0%}
.scoreBox{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}
.stat b{display:block;font-size:24px}
.reviewItem{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
.correctChoice{background:#f0fff7;border-color:#b7dfc8}
.chosen{outline:2px solid #6ea8fe}
.search{min-height:44px;border:1px solid var(--line);border-radius:999px;padding:10px 14px;min-width:260px}
.masteryGood{color:#137333}.masteryMid{color:#9a6700}.masteryLow{color:#b42318}
.masteryBox{margin:12px 0;padding:12px;border:1px solid var(--line);border-radius:16px;background:#fffaf0}
@media(max-width:900px){
  .optionsGrid{grid-template-columns:1fr 1fr}
  .examLayout{grid-template-columns:1fr}
  .sheet{position:static;max-height:none}
  .scoreBox{grid-template-columns:1fr 1fr}
}
@media(max-width:520px){
  body{padding:10px}
  .hero,.panel,.booklet,.sheet,.results{border-radius:16px;padding:14px}
  .optionsGrid,.scoreBox{grid-template-columns:1fr}
  .question{font-size:21px}
  .sheetRow{grid-template-columns:44px repeat(4,1fr);gap:5px}
  .bubble{padding:7px}
}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <a class="btn" href="../index.html">← Main Reviewer</a>
    <h1>Subject / Range Mock Exam</h1>
    <p class="mini">Range Only Mode: pili ka ng subject at Q range. Auto-detect ang max Q ng subject. Walang item count. Walang timer.</p>
  </section>

  <section class="panel" id="setup">
    <div class="optionsGrid">
      <label>Subject
        <select id="subjectSelect"></select>
      </label>
      <label>Range start
        <input id="rangeStart" type="number" min="1" value="1">
      </label>
      <label>Range end
        <input id="rangeEnd" type="number" min="1" value="999">
      </label>
      <label>Order
        <select id="orderMode">
          <option value="random">Random from range</option>
          <option value="sequential">Sequential from range</option>
        </select>
      </label>
    </div>
    <div class="warning" id="rangeInfo">Loading cards...</div>
    <div class="topActions">
      <button class="btn primary" id="startBtn" type="button">Start Range Mock Exam</button>
      <button class="btn" id="setFullBtn" type="button">Use Full Subject Range</button>
      <button class="btn" id="resumeBtn" type="button" style="display:none">Resume Last Range Exam</button>
      <button class="btn danger" id="discardBtn" type="button" style="display:none">Discard Last Range Exam</button>
      <button class="btn danger" id="clearBtn" type="button">Clear Subject Exam Data</button>
    </div>
    <p class="mini">Choices are shuffled every attempt. Choices stay within the same question only.</p>
  </section>

  <section class="examShell" id="examShell">
    <div class="examTop">
      <div>
        <strong id="progressText"></strong>
        <div class="mini" id="sourceText"></div>
        <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
        <div class="mini" id="statusText"></div>
      </div>
      <button class="btn danger" id="submitBtnTop" type="button">Submit Exam</button>
    </div>

    <div class="examLayout">
      <main class="booklet">
        <div class="qMeta">
          <span class="pill" id="qid"></span>
          <span class="pill" id="qcat"></span>
        </div>
        <div class="question" id="questionText"></div>
        <div class="visualBox" id="visualBox"></div>
        <div class="choices" id="choicesBox"></div>
        <div class="navBtns">
          <button class="btn" id="prevBtn" type="button">Previous</button>
          <button class="btn" id="nextBtn" type="button">Next</button>
          <button class="btn" id="nextBlankBtn" type="button">Next Unanswered</button>
          <button class="btn danger" id="submitBtn" type="button">Submit Exam</button>
        </div>
      </main>

      <aside class="sheet">
        <h2>Answer Sheet</h2>
        <div class="mini" id="sheetStats"></div>
        <div id="answerSheet"></div>
      </aside>
    </div>
  </section>

  <section class="results" id="results" style="display:none"></section>
</div>

<script>
const CONFIG = {
  sources: [
    {name:'History', path:'../history/cards.json'},
    {name:'Theory', path:'../theory/cards.json'},
    {name:'Planning', path:'../planning/cards.json'},
    {name:'Tropical Design and Green Architecture', path:'../tropical-design-and-green-architecture/cards.json'},
    {name:'Structural Concepts', path:'../structural-concepts/cards.json'},
    {name:'Building Materials', path:'../building-materials/cards.json'},
    {name:'Building Construction', path:'../building-construction/cards.json'},
    {name:'Building Utilities', path:'../building-utilities/cards.json'},
    {name:'Building Laws', path:'../building-laws/cards.json'},
    {name:'Professional Practice', path:'../professional-practice/cards.json'},
    {name:'ADSP Rule 7 & 8', path:'../adsp-rule-7-8/cards.json'}
  ]
};

const SAVE_KEY = 'aleSubjectRangeExamV4';
let allCards = [];
let allCardsRaw = [];
let loadedWarnings = [];
let exam = [];
let answers = [];
let current = 0;
let attemptMeta = null;
let autosaveInt = null;
let userEditedRangeEnd = false;

const $ = (id) => document.getElementById(id);

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, (m) => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;'
  }[m]));
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function populateSubjects(){
  $('subjectSelect').innerHTML = CONFIG.sources
    .map(s => `<option value="${esc(s.name)}">${esc(s.name)}</option>`)
    .join('');
}

function normalizeCard(card, index, sourceName){
  let choices = [];
  if(Array.isArray(card.choices)){
    choices = card.choices.map((x) => {
      if(typeof x === 'string') return x;
      return x.text || x.answer || x.label || '';
    }).filter(Boolean);
  }
  if(!choices.length && Array.isArray(card.options)){
    choices = card.options.filter(Boolean);
  }

  let correctText = '';
  const letter = String(card.correctLetter || card.correct || '').trim().toLowerCase();
  if(['a','b','c','d'].includes(letter)){
    correctText = choices[letter.charCodeAt(0)-97] || '';
  }else{
    correctText = String(card.correctText || card.correctAnswer || card.answer || '').replace(/^[A-D]\.\s*/i,'').trim();
  }

  if(!correctText && card.answer){
    correctText = String(card.answer).replace(/^[A-D]\.\s*/i,'').trim();
  }

  return {
    ...card,
    sourceName,
    displayId: card.displayId || card.id || card.uid || ('Q'+(index+1)),
    category: card.category || sourceName,
    question: card.question || '',
    choices: choices.slice(0,4),
    correctText,
    explanation: card.explanation || '',
    keyMemory: card.keyMemory || '',
    questionImage: card.questionImage || '',
    image: card.image || '',
    visualUrl: card.visualUrl || '',
    _sourceIndex: index + 1
  };
}

function displayNumber(card, fallbackIndex){
  const raw = String(card.displayId || card.id || card.uid || '').trim();
  const match = raw.match(/(\d+)/);
  if(match) return Number(match[1]);
  return card._sourceIndex || fallbackIndex + 1;
}

function hasDirectImage(card){
  return !!(card.questionImage || card.image || card.visualUrl);
}

function isMissingVisualIdentify(card){
  const q = String(card.question || '').trim().toLowerCase();
  const hasQuery = !!(
    card.questionImageQuery ||
    card.imageQuery ||
    (Array.isArray(card.questionImageQueries) && card.questionImageQueries.length)
  );
  return hasQuery && !hasDirectImage(card) && (q === 'identify' || q === 'identify.' || q.length <= 60);
}

async function loadCards(){
  loadedWarnings = [];
  const chunks = [];

  await Promise.all(CONFIG.sources.map(async (src) => {
    try{
      const response = await fetch(src.path, {cache:'no-store'});
      if(!response.ok) throw new Error(String(response.status));
      let data = await response.json();
      if(!Array.isArray(data)) data = data.cards || [];
      chunks.push(...data.map((card, index) => normalizeCard(card, index, src.name)));
    }catch(error){
      loadedWarnings.push('Could not load ' + src.name + ' cards.json');
    }
  }));

  allCardsRaw = chunks;
  allCards = chunks.filter(card => !isMissingVisualIdentify(card));

  setFullSubjectRange(true);
  updateRangeInfo();
  renderResumeButtons();
}

function selectedSubject(){
  return $('subjectSelect').value;
}

function subjectRawCards(){
  const subject = selectedSubject();
  return allCardsRaw.filter(card => card.sourceName === subject);
}

function subjectUsableCards(){
  const subject = selectedSubject();
  return allCards.filter(card => card.sourceName === subject);
}

function subjectMinMax(){
  const cards = subjectRawCards();
  if(!cards.length) return {min:1, max:1, totalRaw:0, totalUsable:0, skipped:0};

  const nums = cards.map((card, index) => displayNumber(card, index)).filter(Number.isFinite);
  const min = Math.min(...nums);
  const max = Math.max(...nums);
  const usable = subjectUsableCards();

  return {
    min,
    max,
    totalRaw: cards.length,
    totalUsable: usable.length,
    skipped: cards.length - usable.length
  };
}

function setFullSubjectRange(force=false){
  const stats = subjectMinMax();
  $('rangeStart').value = stats.min || 1;
  $('rangeEnd').value = stats.max || 1;
  userEditedRangeEnd = false;
  updateRangeInfo();
}

function rangeValues(){
  const stats = subjectMinMax();
  const start = Math.max(1, Number($('rangeStart').value || stats.min || 1));
  const end = Math.max(start, Number($('rangeEnd').value || stats.max || start));
  return {start, end};
}

function subjectRangePool(){
  const subject = selectedSubject();
  const {start, end} = rangeValues();

  return allCards
    .filter((card, index) => {
      const number = displayNumber(card, index);
      return card.sourceName === subject && number >= start && number <= end;
    })
    .sort((a,b) => displayNumber(a,0) - displayNumber(b,0));
}

function updateRangeInfo(){
  const stats = subjectMinMax();
  const pool = subjectRangePool();
  const {start, end} = rangeValues();
  const order = $('orderMode').value === 'random' ? 'Question order: random' : 'Question order: sequential';

  $('rangeInfo').innerHTML =
    `<span class="subjectBadge good">${esc(selectedSubject())}</span>` +
    `<span class="subjectBadge">Subject total: ${stats.totalRaw}</span>` +
    `<span class="subjectBadge">Subject max Q: ${stats.max}</span>` +
    `<span class="subjectBadge">Selected range: Q${start}–Q${end}</span>` +
    `<span class="subjectBadge good">${pool.length} usable in selected range</span>` +
    `<span class="subjectBadge">${order}</span>` +
    `<span class="subjectBadge">No timer</span>` +
    `<span class="subjectBadge">Choices shuffled</span>` +
    (stats.skipped ? `<span class="subjectBadge warn">${stats.skipped} image-missing identify skipped</span>` : '') +
    `<br>` +
    (pool.length ? `Exam will use all ${pool.length} usable questions in this selected range.` : 'No usable cards in this selected subject/range.') +
    (loadedWarnings.length ? '<br>' + loadedWarnings.map(esc).join('<br>') : '');
}

function prepareQuestion(card){
  let rawChoices = card.choices.map(text => ({
    text,
    correct: String(text).trim() === String(card.correctText).trim()
  }));

  if(!rawChoices.some(choice => choice.correct) && card.correctText){
    rawChoices.push({text: card.correctText, correct: true});
  }

  rawChoices = rawChoices.filter(choice => choice.text).slice(0,4);

  if(!rawChoices.some(choice => choice.correct) && rawChoices.length){
    rawChoices[0].correct = true;
  }

  const randomizedChoices = shuffle(rawChoices);
  return {
    ...card,
    randomizedChoices,
    correctIndex: randomizedChoices.findIndex(choice => choice.correct)
  };
}

function startExam(){
  let pool = subjectRangePool();

  if(!pool.length){
    alert('No usable questions in this subject/range.');
    return;
  }

  pool = $('orderMode').value === 'random' ? shuffle(pool) : pool;
  exam = pool.map(prepareQuestion);
  answers = Array(exam.length).fill(null);
  current = 0;

  const {start, end} = rangeValues();
  attemptMeta = {
    subject: selectedSubject(),
    start,
    end,
    order: $('orderMode').value,
    startedAt: Date.now(),
    preparedExam: exam
  };

  $('setup').style.display = 'none';
  $('results').style.display = 'none';
  $('examShell').style.display = 'block';

  renderQuestion();
  beginAutosave();
}

function saveProgress(){
  if(!exam.length || !attemptMeta) return;
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    attemptMeta,
    answers,
    current,
    savedAt: Date.now()
  }));
}

function beginAutosave(){
  clearInterval(autosaveInt);
  autosaveInt = setInterval(saveProgress, 3000);
  saveProgress();
}

function renderResumeButtons(){
  try{
    const saved = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
    const show = !!(saved && saved.attemptMeta && Array.isArray(saved.attemptMeta.preparedExam) && saved.attemptMeta.preparedExam.length);
    $('resumeBtn').style.display = show ? 'inline-flex' : 'none';
    $('discardBtn').style.display = show ? 'inline-flex' : 'none';
  }catch(e){}
}

function resumeExam(){
  const saved = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
  if(!saved || !saved.attemptMeta || !Array.isArray(saved.attemptMeta.preparedExam)){
    alert('No saved range exam.');
    return;
  }

  attemptMeta = saved.attemptMeta;
  exam = saved.attemptMeta.preparedExam;
  answers = Array(exam.length).fill(null);
  (saved.answers || []).forEach((value, index) => {
    if(index < answers.length) answers[index] = value;
  });
  current = Math.min(saved.current || 0, exam.length - 1);

  $('setup').style.display = 'none';
  $('results').style.display = 'none';
  $('examShell').style.display = 'block';

  renderQuestion();
  beginAutosave();
}

function discardSaved(){
  if(confirm('Discard saved Subject Range Exam?')){
    localStorage.removeItem(SAVE_KEY);
    renderResumeButtons();
  }
}

function clearAllData(){
  if(confirm('Clear all Subject Range Exam saved data?')){
    localStorage.removeItem(SAVE_KEY);
    renderResumeButtons();
  }
}

function renderQuestion(){
  const question = exam[current];

  $('progressText').textContent = `Question ${current+1} of ${exam.length}`;
  $('sourceText').textContent = `${attemptMeta.subject} · Q${attemptMeta.start}–Q${attemptMeta.end} · No timer`;
  $('qid').textContent = question.displayId;
  $('qcat').textContent = question.category;
  $('questionText').textContent = question.question;

  renderVisual(question);

  $('choicesBox').innerHTML = question.randomizedChoices.map((choice, index) => {
    const checked = answers[current] === index ? 'checked' : '';
    const selected = answers[current] === index ? 'selected' : '';
    const letter = String.fromCharCode(65 + index);
    return `<label class="choice ${selected}">
      <input type="radio" name="answer" ${checked} onchange="chooseAnswer(${index})">
      <span>${letter}. ${esc(choice.text)}</span>
    </label>`;
  }).join('');

  renderSheet();
  saveProgress();
}

function renderVisual(question){
  const box = $('visualBox');
  const url = question.questionImage || question.image || question.visualUrl || '';
  if(!url){
    box.className = 'visualBox';
    box.innerHTML = '';
    return;
  }

  box.className = 'visualBox show';
  box.innerHTML = `<img src="${esc(url)}" alt="Question visual">`;
}

function chooseAnswer(index){
  answers[current] = index;
  renderQuestion();
}

function renderSheet(){
  const answered = answers.filter(value => value !== null).length;
  const percent = exam.length ? (answered / exam.length) * 100 : 0;
  $('progressFill').style.width = percent + '%';
  $('statusText').textContent = `Answered ${answered}/${exam.length}. Blank ${exam.length - answered}.`;
  $('sheetStats').textContent = `Answered ${answered}/${exam.length}`;

  $('answerSheet').innerHTML = exam.map((question, index) => {
    const rowClass = index === current ? 'sheetRow current' : 'sheetRow';
    const bubbles = [0,1,2,3].map(choiceIndex => {
      const on = answers[index] === choiceIndex ? 'on' : '';
      const letter = String.fromCharCode(65 + choiceIndex);
      return `<button class="bubble ${on}" type="button" onclick="answers[${index}]=${choiceIndex};current=${index};renderQuestion()">${letter}</button>`;
    }).join('');

    return `<div class="${rowClass}"><strong>${index+1}</strong>${bubbles}</div>`;
  }).join('');
}

function goNextUnanswered(){
  const after = answers.findIndex((answer, index) => answer === null && index > current);
  const first = answers.findIndex(answer => answer === null);

  if(after >= 0) current = after;
  else if(first >= 0) current = first;
  else{
    alert('No unanswered questions.');
    return;
  }

  renderQuestion();
}

function submitExam(){
  const blank = answers.filter(answer => answer === null).length;
  if(blank && !confirm(`You still have ${blank} unanswered questions. Submit anyway?`)){
    return;
  }

  clearInterval(autosaveInt);
  saveProgress();

  const correct = exam.reduce((sum, question, index) => {
    return sum + (answers[index] !== null && question.randomizedChoices[answers[index]]?.correct ? 1 : 0);
  }, 0);

  const percent = exam.length ? (correct / exam.length) * 100 : 0;

  $('examShell').style.display = 'none';
  $('results').style.display = 'block';

  $('results').innerHTML = `
    <h2>Results</h2>
    <div class="scoreBox">
      <div class="stat">Raw score<b>${correct}/${exam.length}</b></div>
      <div class="stat">Percentage<b>${percent.toFixed(1)}%</b></div>
      <div class="stat">Subject<b>${esc(attemptMeta.subject)}</b></div>
      <div class="stat">Range<b>Q${attemptMeta.start}–Q${attemptMeta.end}</b></div>
    </div>
    ${masteryMessage(percent)}
    <div class="topActions">
      <button class="btn primary" type="button" onclick="newExam()">New Range Exam</button>
      <button class="btn" type="button" onclick="document.getElementById('fullReview').scrollIntoView({behavior:'smooth'})">Review Full Exam</button>
    </div>
    <div id="fullReview">
      <h2>Full Exam Review</h2>
      <div class="reviewControls">
        <button class="btn primary" type="button" onclick="filterReview('all')">All</button>
        <button class="btn" type="button" onclick="filterReview('correct')">Correct</button>
        <button class="btn" type="button" onclick="filterReview('wrong')">Wrong</button>
        <button class="btn" type="button" onclick="filterReview('blank')">Unanswered</button>
        <input class="search" id="reviewSearch" placeholder="Search question/category..." oninput="applyReviewFilter()">
      </div>
      <div id="reviewList">${exam.map((question,index) => reviewItem(question,index)).join('')}</div>
    </div>
  `;

  window.scrollTo(0,0);
}

let reviewFilter = 'all';

function masteryMessage(percent){
  if(percent >= 85) return `<div class="masteryBox masteryGood"><strong>Readiness:</strong> Strong. Kaya mo na itong range, pero i-review pa rin ang mali at hula.</div>`;
  if(percent >= 75) return `<div class="masteryBox masteryMid"><strong>Readiness:</strong> Passing. Kaya na, pero kailangan pa i-secure weak items.</div>`;
  if(percent >= 60) return `<div class="masteryBox masteryMid"><strong>Readiness:</strong> Almost there. Ulitin pa ang range after review.</div>`;
  return `<div class="masteryBox masteryLow"><strong>Readiness:</strong> Hindi pa safe. Balikan muna ang notes/cards bago ulitin.</div>`;
}

function reviewStatus(index){
  if(answers[index] === null) return 'blank';
  return exam[index].randomizedChoices[answers[index]]?.correct ? 'correct' : 'wrong';
}

function reviewItem(question, index){
  const status = reviewStatus(index);
  const userAnswer = answers[index] === null
    ? 'Unanswered'
    : `${String.fromCharCode(65+answers[index])}. ${question.randomizedChoices[answers[index]].text}`;

  const correctIndex = question.correctIndex;
  const correctAnswer = correctIndex >= 0
    ? `${String.fromCharCode(65+correctIndex)}. ${question.randomizedChoices[correctIndex].text}`
    : question.correctText;

  const choicesHtml = question.randomizedChoices.map((choice, choiceIndex) => {
    const classes = [
      choiceIndex === correctIndex ? 'correctChoice' : '',
      choiceIndex === answers[index] ? 'chosen' : ''
    ].join(' ');
    const markers = [
      choiceIndex === correctIndex ? '✓ Correct' : '',
      choiceIndex === answers[index] ? 'Your answer' : ''
    ].filter(Boolean).join(' · ');

    return `<p class="${classes}">
      <strong>${String.fromCharCode(65+choiceIndex)}. ${esc(choice.text)}</strong>
      ${markers ? `<span class="mini"> — ${esc(markers)}</span>` : ''}
    </p>`;
  }).join('');

  return `<div class="reviewItem" data-status="${status}" data-text="${esc((question.question || '') + ' ' + (question.category || ''))}">
    <h3>Q${index+1} · ${esc(question.displayId)} · ${esc(question.category)}</h3>
    <p><strong>${esc(question.question)}</strong></p>
    ${choicesHtml}
    <p><strong>Your answer:</strong> ${esc(userAnswer)}</p>
    <p><strong>Correct answer:</strong> ${esc(correctAnswer)}</p>
    ${question.explanation ? `<p><strong>Explanation:</strong> ${esc(question.explanation)}</p>` : ''}
    ${question.keyMemory ? `<p><strong>Key memory:</strong> ${esc(question.keyMemory)}</p>` : ''}
  </div>`;
}

function filterReview(filter){
  reviewFilter = filter;
  applyReviewFilter();
}

function applyReviewFilter(){
  const query = ($('reviewSearch')?.value || '').toLowerCase().trim();
  document.querySelectorAll('#reviewList .reviewItem').forEach(item => {
    const status = item.dataset.status;
    const text = (item.dataset.text || '').toLowerCase();
    let show = reviewFilter === 'all' || reviewFilter === status;
    if(query && !text.includes(query)) show = false;
    item.style.display = show ? '' : 'none';
  });
}

function newExam(){
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

function init(){
  populateSubjects();

  $('subjectSelect').addEventListener('change', () => {
    setFullSubjectRange(true);
  });

  $('rangeStart').addEventListener('input', updateRangeInfo);
  $('rangeStart').addEventListener('change', updateRangeInfo);
  $('rangeEnd').addEventListener('input', () => {
    userEditedRangeEnd = true;
    updateRangeInfo();
  });
  $('rangeEnd').addEventListener('change', updateRangeInfo);
  $('orderMode').addEventListener('change', updateRangeInfo);

  $('startBtn').addEventListener('click', startExam);
  $('setFullBtn').addEventListener('click', () => setFullSubjectRange(true));
  $('resumeBtn').addEventListener('click', resumeExam);
  $('discardBtn').addEventListener('click', discardSaved);
  $('clearBtn').addEventListener('click', clearAllData);
  $('prevBtn').addEventListener('click', () => {
    current = Math.max(0, current - 1);
    renderQuestion();
  });
  $('nextBtn').addEventListener('click', () => {
    current = Math.min(exam.length - 1, current + 1);
    renderQuestion();
  });
  $('nextBlankBtn').addEventListener('click', goNextUnanswered);
  $('submitBtn').addEventListener('click', submitExam);
  $('submitBtnTop').addEventListener('click', submitExam);

  loadCards();
}

init();
</script>
