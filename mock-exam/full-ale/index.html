<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Full ALE Simulation</title>
<style>
:root{--bg:#f3f0ea;--card:#fffdf8;--ink:#061a38;--muted:#667085;--line:#ded6c9;--green:#006b35;--gold:#9a6a1d;--red:#9b1c1c;--chip:#eee7dc;--shadow:0 10px 26px rgba(30,25,16,.07)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:20px 24px 44px}
.wrap{max-width:1080px;margin:0 auto} .hero,.panel,.questionCard,.results{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)} .hero{padding:24px 28px;margin-bottom:14px}
h1{margin:0 0 6px;font-size:30px;font-weight:900} .subtitle{margin:0;color:#40506a;line-height:1.45} .btn{border:1px solid var(--line);background:#fffaf0;color:var(--ink);border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;text-decoration:none} .btn.primary{background:#0c3924;color:white;border-color:#0c3924} .btn.danger{color:var(--red)} .topActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px} .panel{padding:18px;margin-bottom:14px} .seg{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px} .seg h2{margin:0 0 8px;font-size:18px} .meta{color:var(--green);font-weight:900}
.warning{margin-top:12px;color:#7a520f;background:#fff7df;border:1px solid #ead39a;border-radius:14px;padding:12px;display:none} .timer{font-weight:1000;font-size:22px;color:var(--red)} .examShell{display:none} .examTop{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap} .mini{font-size:13px;color:#667085}
.questionCard{padding:22px;margin-bottom:14px} .pill{display:inline-block;background:var(--chip);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;color:#5c6470;margin:0 6px 10px 0} .question{font-size:20px;line-height:1.5;font-weight:850;white-space:pre-wrap} .choices{display:grid;gap:10px} .choice{display:flex;gap:10px;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px;cursor:pointer} .choice.selected{background:#fff8e7;border-color:#9a6a1d} .qGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:7px;margin-top:12px} .qdot{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 4px;font-weight:900;cursor:pointer} .qdot.current{background:#061a38;color:#fff} .qdot.answered{border-color:#006b35} .qdot.flagged{background:#fff4cf;border-color:#d9a72a} .results{display:none;padding:22px} .scoreBox{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0} .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px} .stat b{display:block;font-size:22px;margin-top:6px} .pass{color:var(--green)} .fail{color:var(--red)} table{width:100%;border-collapse:collapse;font-size:13px} th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top} .reviewItem{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;margin:10px 0} .explain{white-space:pre-wrap;color:#263853;line-height:1.45}
@media(max-width:760px){body{padding:14px}.grid,.scoreBox{grid-template-columns:1fr}.question{font-size:17px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero"><h1>Full ALE Simulation</h1><p class="subtitle">Official total: 450 items · 20 hours split into 2 exam days. Day 1: Exam 1 + break + Exam 2. Day 2: Exam 3. Weighted score: 30% + 30% + 40%.</p><div class="topActions"><a class="btn" href="../">← Mock Exam Dashboard</a><a class="btn" href="../../">Main Reviewer</a></div></header>
<section class="panel" id="setup"><div class="grid" id="segments"></div><div class="warning" id="warning"></div><div class="topActions"><button class="btn primary" id="startSelected">Start Selected Segment</button><button class="btn" id="finalBtn">Compute Final Weighted Score</button><button class="btn danger" id="resetBtn">Reset Full ALE Progress</button></div><div id="progressBox"></div></section>
<section class="examShell" id="examShell"><div class="examTop"><div><strong id="progressText"></strong><div class="mini" id="sourceText"></div></div><div class="timer" id="timer"></div></div><article class="questionCard"><div><span class="pill" id="qid"></span><span class="pill" id="qcat"></span><span class="pill" id="flagPill"></span></div><p class="question" id="questionText"></p><div class="choices" id="choicesBox"></div></article><div class="topActions"><button class="btn" id="prevBtn">Previous</button><button class="btn" id="nextBtn">Next</button><button class="btn" id="flagBtn">Flag Question</button><button class="btn danger" id="submitBtn">Submit Segment</button></div><div class="panel"><strong>Question Navigation</strong><div class="qGrid" id="qGrid"></div></div></section>
<section class="results" id="results"></section>
</div>
<script>
const CONFIGS={
  "exam1": {
    "shortTitle": "Exam 1",
    "title": "History, Theory, Planning & Architectural Practice",
    "officialItems": 100,
    "officialTimeLabel": "5 hours",
    "paceMinutes": 3,
    "weightLabel": "30%",
    "sources": [
      {
        "name": "History",
        "path": "../../history/cards.json"
      },
      {
        "name": "Theory",
        "path": "../../theory/cards.json"
      },
      {
        "name": "Planning",
        "path": "../../planning/cards.json"
      },
      {
        "name": "Professional Practice",
        "path": "../../professional-practice/cards.json"
      },
      {
        "name": "Building Laws",
        "path": "../../building-laws/cards.json"
      },
      {
        "name": "Tropical Design and Green Architecture",
        "path": "../../tropical-design-and-green-architecture/cards.json"
      }
    ],
    "options": [
      {
        "items": 10,
        "label": "30 minutes"
      },
      {
        "items": 25,
        "label": "1 hour 15 minutes"
      },
      {
        "items": 50,
        "label": "2 hours 30 minutes"
      },
      {
        "items": 100,
        "label": "5 hours"
      }
    ],
    "weight": 0.3
  },
  "exam2": {
    "shortTitle": "Exam 2",
    "title": "Utilities, Structural Conceptualization, Building Materials & Technology",
    "officialItems": 150,
    "officialTimeLabel": "5 hours",
    "paceMinutes": 2,
    "weightLabel": "30%",
    "sources": [
      {
        "name": "Building Utilities",
        "path": "../../building-utilities/cards.json"
      },
      {
        "name": "Structural Concepts",
        "path": "../../structural-concepts/cards.json"
      },
      {
        "name": "Building Materials",
        "path": "../../building-materials/cards.json"
      },
      {
        "name": "Building Construction",
        "path": "../../building-construction/cards.json"
      }
    ],
    "options": [
      {
        "items": 10,
        "label": "20 minutes"
      },
      {
        "items": 25,
        "label": "50 minutes"
      },
      {
        "items": 50,
        "label": "1 hour 40 minutes"
      },
      {
        "items": 75,
        "label": "2 hours 30 minutes"
      },
      {
        "items": 150,
        "label": "5 hours"
      }
    ],
    "weight": 0.3
  },
  "exam3": {
    "shortTitle": "Exam 3",
    "title": "Architectural Design and Site Planning / ADSP",
    "officialItems": 200,
    "officialTimeLabel": "10 hours",
    "paceMinutes": 3,
    "weightLabel": "40%",
    "sources": [
      {
        "name": "ADSP Rule 7 & 8",
        "path": "../../adsp-rule-7-8/cards.json"
      },
      {
        "name": "Building Laws",
        "path": "../../building-laws/cards.json"
      },
      {
        "name": "Planning",
        "path": "../../planning/cards.json"
      },
      {
        "name": "Tropical Design and Green Architecture",
        "path": "../../tropical-design-and-green-architecture/cards.json"
      },
      {
        "name": "Structural Concepts",
        "path": "../../structural-concepts/cards.json"
      }
    ],
    "options": [
      {
        "items": 10,
        "label": "30 minutes"
      },
      {
        "items": 25,
        "label": "1 hour 15 minutes"
      },
      {
        "items": 50,
        "label": "2 hours 30 minutes"
      },
      {
        "items": 100,
        "label": "5 hours"
      },
      {
        "items": 200,
        "label": "10 hours"
      }
    ],
    "weight": 0.4
  }
}; const STORE='aleFullAleProgress'; const HISTORY_KEY='aleMockExamHistory';
let selectedKey='exam1', cfg=null, allCards=[], exam=[], answers=[], flagged=[], current=0, startedAt=0, timeLimit=0, timerInt=null, submitted=false, loadedWarnings=[];
const $=id=>document.getElementById(id); function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))} function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a} function fmt(sec){sec=Math.max(0,Math.floor(sec||0));const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return(h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')} function readProgress(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){return{}}} function saveProgress(p){localStorage.setItem(STORE,JSON.stringify(p))} function readHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]')}catch(e){return[]}} function saveHistory(row){const rows=readHistory();rows.push(row);localStorage.setItem(HISTORY_KEY,JSON.stringify(rows.slice(-80)))}
function renderSegments(){const p=readProgress();$('segments').innerHTML=Object.entries(CONFIGS).map(([k,c])=>`<label class="seg"><input type="radio" name="seg" value="${k}" ${k===selectedKey?'checked':''}> <h2>${c.shortTitle}</h2><p>${c.title}</p><p class="meta">${c.officialItems} items · ${c.officialTimeLabel} · ${Math.round(c.weight*100)}%</p><p>${p[k]?('Saved: '+p[k].percentage.toFixed(1)+'%'):'Not taken yet'}</p></label>`).join('');document.querySelectorAll('input[name=seg]').forEach(r=>r.onchange=()=>{selectedKey=r.value;renderSegments()}); renderProgress();}
function renderProgress(){const p=readProgress();const rows=Object.entries(CONFIGS).map(([k,c])=>`<tr><td>${c.shortTitle}</td><td>${c.officialItems}</td><td>${Math.round(c.weight*100)}%</td><td>${p[k]?p[k].percentage.toFixed(1)+'%':'—'}</td><td>${p[k]?(p[k].weighted.toFixed(2)+' pts'):'—'}</td></tr>`).join('');const total=Object.values(p).reduce((s,r)=>s+(r.weighted||0),0);$('progressBox').innerHTML=`<table><thead><tr><th>Block</th><th>Items</th><th>Weight</th><th>Score</th><th>Weighted</th></tr></thead><tbody>${rows}</tbody></table><p class="meta">Current weighted total: ${total.toFixed(2)}%</p>`}
function choiceText(ch){return typeof ch==='string'?ch:(ch?.text??'')} function normalize(raw,src){const arr=Array.isArray(raw)?raw:(Array.isArray(raw.cards)?raw.cards:[]);return arr.filter(c=>c&&c.question).map((c,idx)=>{const rawChoices=Array.isArray(c.choices)?c.choices:[];const cl=String(c.correctLetter||'').trim().toLowerCase();const choices=rawChoices.map((ch,i)=>({letter:String(ch.letter||String.fromCharCode(97+i)).toLowerCase(),text:choiceText(ch)})).filter(ch=>ch.text);let ct=(choices.find(ch=>ch.letter===cl)||{}).text||'';if(!ct&&c.answer)ct=String(c.answer).replace(/^[A-Da-d]\s*[.)-]\s*/,'').trim();return{uid:c.uid||c.id||c.displayId||src+'-'+idx,displayId:c.displayId||c.id||c.uid||'Q'+(idx+1),category:c.category||src,sourceName:src,question:String(c.question).trim(),choices,correctText:ct,answer:c.answer||ct,keyMemory:c.keyMemory||'',explanation:c.explanation||''}}).filter(c=>c.choices.length>=2&&c.correctText)}
async function loadCards(){loadedWarnings=[];const chunks=await Promise.all(cfg.sources.map(async src=>{try{const res=await fetch(src.path+'?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error(res.status);return normalize(await res.json(),src.name)}catch(e){loadedWarnings.push(src.name);return[]}}));allCards=chunks.flat();if(loadedWarnings.length){$('warning').style.display='block';$('warning').textContent='Some subject sources are not available yet: '+loadedWarnings.join(', ')}return allCards}
function prep(c){const choices=c.choices.map(ch=>({text:ch.text,correct:ch.text.trim()===c.correctText.trim()}));if(!choices.some(ch=>ch.correct))choices.push({text:c.correctText,correct:true});const randomized=shuffle(choices);return{...c,randomizedChoices:randomized,correctIndex:randomized.findIndex(ch=>ch.correct)}}
async function start(){cfg=CONFIGS[selectedKey];await loadCards();if(!allCards.length){alert('No cards available for this segment yet.');return}exam=shuffle(allCards).slice(0,Math.min(cfg.officialItems,allCards.length)).map(prep);answers=Array(exam.length).fill(null);flagged=Array(exam.length).fill(false);current=0;submitted=false;timeLimit=cfg.officialItems*cfg.paceMinutes*60;startedAt=Date.now();$('setup').style.display='none';$('results').style.display='none';$('examShell').style.display='block';renderQ();clearInterval(timerInt);timerInt=setInterval(tick,1000);tick()}
function tick(){const left=timeLimit-Math.floor((Date.now()-startedAt)/1000);$('timer').textContent=fmt(left);if(left<=0&&!submitted)submit(true)} function renderQ(){const q=exam[current];$('progressText').textContent=cfg.shortTitle+' · Question '+(current+1)+' of '+exam.length;$('sourceText').textContent='Source: '+q.sourceName;$('qid').textContent=q.displayId;$('qcat').textContent=q.category;$('flagPill').textContent=flagged[current]?'Flagged':'Not flagged';$('questionText').textContent=q.question;$('choicesBox').innerHTML=q.randomizedChoices.map((ch,i)=>`<label class="choice ${answers[current]===i?'selected':''}"><input type="radio" name="choice" ${answers[current]===i?'checked':''} data-index="${i}"><span><strong>${String.fromCharCode(65+i)}.</strong> ${escapeHtml(ch.text)}</span></label>`).join('');document.querySelectorAll('input[name=choice]').forEach(inp=>inp.onchange=()=>{answers[current]=Number(inp.dataset.index);renderQ()});$('prevBtn').disabled=current===0;$('nextBtn').disabled=current===exam.length-1;renderGrid()} function renderGrid(){$('qGrid').innerHTML=exam.map((q,i)=>`<button class="qdot ${i===current?'current':''} ${answers[i]!=null?'answered':''} ${flagged[i]?'flagged':''}" data-i="${i}">${i+1}</button>`).join('');document.querySelectorAll('.qdot').forEach(b=>b.onclick=()=>{current=Number(b.dataset.i);renderQ()})} $('prevBtn').onclick=()=>{if(current>0){current--;renderQ()}};$('nextBtn').onclick=()=>{if(current<exam.length-1){current++;renderQ()}};$('flagBtn').onclick=()=>{flagged[current]=!flagged[current];renderQ()};$('submitBtn').onclick=()=>submit(false);$('startSelected').onclick=start;$('resetBtn').onclick=()=>{if(confirm('Reset Full ALE progress?')){localStorage.removeItem(STORE);renderSegments()}};$('finalBtn').onclick=()=>showFinal();
function breakdown(){const map={};exam.forEach((q,i)=>{const k=q.category||q.sourceName;if(!map[k])map[k]={total:0,correct:0};map[k].total++;if(answers[i]!=null&&q.randomizedChoices[answers[i]]?.correct)map[k].correct++});return map}
function submit(auto){if(submitted)return;if(!auto&&!confirm('Submit this Full ALE segment?'))return;submitted=true;clearInterval(timerInt);const used=Math.floor((Date.now()-startedAt)/1000);const correct=exam.reduce((n,q,i)=>n+(answers[i]!=null&&q.randomizedChoices[answers[i]]?.correct?1:0),0);const pct=correct/exam.length*100;const weighted=pct*cfg.weight;const bd=breakdown();const unanswered=answers.filter(a=>a===null).length;const flagCount=flagged.filter(Boolean).length;const p=readProgress();p[selectedKey]={shortTitle:cfg.shortTitle,score:`${correct}/${exam.length}`,percentage:pct,weighted,weight:cfg.weight,timeUsedSeconds:used,date:new Date().toLocaleString(),subjectBreakdown:bd};saveProgress(p);saveHistory({date:new Date().toLocaleString(),examType:'Full ALE · '+cfg.shortTitle,itemCount:exam.length,score:`${correct}/${exam.length}`,percentage:pct,passFail:pct>=75?'PASS':'FAIL',timeUsedSeconds:used,subjectBreakdown:bd});$('examShell').style.display='none';const wrongs=exam.map((q,i)=>({q,i})).filter(x=>answers[x.i]===null||!x.q.randomizedChoices[answers[x.i]]?.correct);$('results').style.display='block';$('results').innerHTML=`<h2>${cfg.shortTitle} Segment Result</h2><div class="scoreBox"><div class="stat">Raw score<b>${correct}/${exam.length}</b></div><div class="stat">Percentage<b>${pct.toFixed(1)}%</b></div><div class="stat">Weighted<b>${weighted.toFixed(2)} pts</b></div><div class="stat">Time used<b>${fmt(used)}</b></div><div class="stat">Unanswered<b>${unanswered}</b></div><div class="stat">Flagged<b>${flagCount}</b></div></div><div class="topActions"><button class="btn primary" onclick="location.reload()">Back to Full ALE Dashboard</button><button class="btn" onclick="showFinal()">Compute Final Weighted Score</button></div><h3>Wrong Answers Review</h3>${wrongs.length?wrongs.map(({q,i})=>review(q,i)).join(''):'<p>No wrong answers for this segment.</p>'}`;window.scrollTo(0,0)}
function review(q,i){const ua=answers[i]===null?'Unanswered':q.randomizedChoices[answers[i]]?.text;const ca=q.randomizedChoices[q.correctIndex]?.text||q.correctText;return`<div class="reviewItem"><h3>Q${i+1} · ${escapeHtml(q.category)}</h3><p><strong>Question:</strong> ${escapeHtml(q.question)}</p><p><strong>Your answer:</strong> ${escapeHtml(ua)}</p><p><strong>Correct answer:</strong> ${escapeHtml(ca)}</p><p><strong>Key memory:</strong> ${escapeHtml(q.keyMemory||'—')}</p><div class="explain"><strong>Explanation:</strong>\n${escapeHtml(q.explanation||'—')}</div></div>`}
function showFinal(){const p=readProgress();const total=Object.values(p).reduce((s,r)=>s+(r.weighted||0),0);const complete=Object.keys(CONFIGS).every(k=>p[k]);$('results').style.display='block';$('setup').style.display='block';$('examShell').style.display='none';$('results').innerHTML=`<h2>Full ALE Weighted Result</h2><div class="scoreBox"><div class="stat">Weighted score<b>${total.toFixed(2)}%</b></div><div class="stat">Status<b class="${total>=75?'pass':'fail'}">${total>=75?'PASS':'FAIL'}</b></div><div class="stat">Completion<b>${complete?'Complete':'Incomplete'}</b></div><div class="stat">Passing mark<b>75%</b></div></div><table><thead><tr><th>Exam</th><th>Score</th><th>%</th><th>Weight</th><th>Weighted</th></tr></thead><tbody>${Object.entries(CONFIGS).map(([k,c])=>`<tr><td>${c.shortTitle}</td><td>${p[k]?.score||'—'}</td><td>${p[k]?p[k].percentage.toFixed(1)+'%':'—'}</td><td>${Math.round(c.weight*100)}%</td><td>${p[k]?p[k].weighted.toFixed(2):'—'}</td></tr>`).join('')}</tbody></table>`;window.scrollTo(0,0)}
renderSegments();
</script>
</body>
</html>
