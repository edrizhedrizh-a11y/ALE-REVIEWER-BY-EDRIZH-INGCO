<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALE Reviewer by Edrizh Ingco</title>
  <style>
    :root {
      --bg:#f3f0ea; --card:#fffdf8; --ink:#061a38; --muted:#667085;
      --line:#ded6c9; --green:#006b35; --gold:#9a6a1d; --chip:#eee7dc;
      --shadow:0 10px 26px rgba(30,25,16,.07);
    }
    * { box-sizing:border-box; }
    body {
      margin:0; background:var(--bg); color:var(--ink);
      font-family:ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      padding:24px 26px 48px;
    }
    .hero {
      max-width:920px; background:var(--card); border:1px solid var(--line);
      border-radius:24px; padding:28px 36px 30px; box-shadow:var(--shadow);
    }
    h1 { margin:0 0 6px; font-size:38px; line-height:1.12; letter-spacing:.08em; font-weight:900; }
    .subtitle { margin:0; color:#33435d; font-size:13px; letter-spacing:.02em; }
    .grid {
      max-width:920px; display:grid; grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px; margin-top:18px;
    }
    .card {
      min-height:118px; display:block; text-decoration:none; color:var(--ink);
      background:var(--card); border:1px solid var(--line); border-radius:18px;
      padding:16px 16px 18px; box-shadow:var(--shadow);
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .card:hover { transform:translateY(-1px); box-shadow:0 14px 30px rgba(30,25,16,.10); border-color:#cfc5b5; }
    .card.accent { border-color:#d9bc77; background:linear-gradient(180deg,#fffaf0,#fffdf8); }
    .num {
      display:grid; place-items:center; width:30px; height:30px; border-radius:999px;
      background:var(--chip); color:#9a8f7c; font-size:13px; font-weight:900; margin-bottom:20px;
    }
    .card.accent .num { background:#f5dfad; color:#7a520f; }
    h2 { margin:0 0 8px; font-size:16px; line-height:1.22; font-weight:900; letter-spacing:-.01em; }
    .status { margin:0; color:var(--green); font-size:14px; font-weight:900; }
    .card.accent .status { color:var(--gold); }
    .note { max-width:920px; margin:16px 6px 0; font-size:13px; color:#263853; }
    @media(max-width:920px) { .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
    @media(max-width:680px) { body { padding:16px; } .hero { padding:24px; } h1 { font-size:28px; } .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media(max-width:460px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="hero">
    <h1>ALE Reviewer by Edrizh Ingco</h1>
    <p class="subtitle">Main flashcard reviewer dashboard. Mock Exam has its own separate dashboard.</p>
  </header>
  <main class="grid" id="grid"></main>
  <p class="note">Tip: folder names are case-sensitive on GitHub Pages. Each subject folder must contain an <strong>index.html</strong> file.</p>
  <script>
    const SUBJECTS = [
  {
    "title": "History",
    "path": "history/"
  },
  {
    "title": "Theory",
    "path": "theory/"
  },
  {
    "title": "Planning",
    "path": "planning/"
  },
  {
    "title": "Tropical Design and Green Architecture",
    "path": "tropical-design-and-green-architecture/"
  },
  {
    "title": "Building Laws",
    "path": "building-laws/"
  },
  {
    "title": "ADSP Rule 7 & 8",
    "path": "adsp-rule-7-8/"
  },
  {
    "title": "Building Construction",
    "path": "building-construction/"
  },
  {
    "title": "Building Materials",
    "path": "building-materials/"
  },
  {
    "title": "Building Utilities",
    "path": "building-utilities/"
  },
  {
    "title": "Structural Concepts",
    "path": "structural-concepts/"
  },
  {
    "title": "Professional Practice",
    "path": "professional-practice/"
  },
  {
    "title": "Mock Exam",
    "path": "mock-exam/",
    "accent": true
  }
];
    const grid = document.getElementById("grid");
    SUBJECTS.forEach((s, i) => {
      const a = document.createElement("a");
      a.className = "card" + (s.accent ? " accent" : "");
      a.href = s.path;
      a.innerHTML = `<span class="num">${i+1}</span><h2>${s.title}</h2><p class="status">Open reviewer</p>`;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
