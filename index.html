<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALE Reviewer by Edrizh Ingco</title>
  <style>
    :root{
      --bg:#f1eee7;
      --card:#fbfaf6;
      --ink:#0d1f3a;
      --muted:#71777f;
      --line:#ded9cf;
      --accent:#7a4b00;
      --good:#157347;
      --bad:#a03232;
      --shadow:0 22px 60px rgba(30,28,22,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 10% 0%, rgba(255,255,255,.75), transparent 26rem),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.42), transparent 28rem),
        var(--bg);
      color:var(--ink);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      padding:16px 36px 42px;
    }
    .hero{
      max-width:880px;
      background:rgba(255,253,248,.72);
      border:1px solid var(--line);
      border-radius:24px;
      padding:30px 36px 32px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    h1{
      margin:0 0 4px;
      font-size:40px;
      letter-spacing:.01em;
      line-height:1.1;
      font-weight:800;
    }
    .subtitle{
      color:#49566d;
      margin:8px 0 0;
      font-size:13px;
      letter-spacing:.02em;
    }
    .grid{
      max-width:880px;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }
    .card{
      position:relative;
      display:block;
      min-height:120px;
      padding:16px;
      border-radius:18px;
      text-decoration:none;
      color:var(--ink);
      background:rgba(255,253,248,.62);
      border:1px solid var(--line);
      box-shadow:0 18px 40px rgba(30,28,22,.06);
      transition:transform .16s ease,border-color .16s ease,background .16s ease;
      cursor:pointer;
    }
    .card:hover{
      transform:translateY(-2px);
      border-color:#111827;
      background:rgba(255,253,248,.9);
    }
    .num{
      width:30px;height:30px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:#eee8de;
      color:#9a8870;
      font-size:13px;
      font-weight:800;
      margin-bottom:12px;
    }
    .title{
      font-weight:800;
      line-height:1.12;
      font-size:15.5px;
      margin-bottom:10px;
    }
    .status{
      color:var(--accent);
      font-size:13px;
      font-weight:800;
    }
    .status.checking{color:#8b929b}
    .status.ok{color:var(--good)}
    .status.missing{color:var(--bad)}
    .note{
      max-width:880px;
      margin:14px 6px 0;
      color:#42516c;
      font-size:12px;
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      max-width:min(720px,calc(100vw - 24px));
      background:#111827;
      color:white;
      border-radius:14px;
      padding:12px 16px;
      font-size:13px;
      line-height:1.45;
      box-shadow:0 20px 50px rgba(0,0,0,.18);
      display:none;
      z-index:20;
    }
    .toast.show{display:block}
    code{background:rgba(255,255,255,.16);padding:1px 5px;border-radius:5px}
    @media(max-width:820px){
      body{padding:12px 16px 32px}
      .hero{padding:24px 22px;border-radius:22px}
      h1{font-size:32px}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media(max-width:520px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>ALE Reviewer by Edrizh Ingco</h1>
    <p class="subtitle">Dashboard v3 — all cards are clickable; folder aliases are checked before opening to avoid wrong 404 links.</p>
  </header>

  <main class="grid" id="grid"></main>

  <p class="note">
    Tip: Folder names are case-sensitive on GitHub Pages. Each subject folder must contain an <strong>index.html</strong> file.
  </p>

  <div class="toast" id="toast"></div>

<script>
const subjects = [
  { n:1, title:"History", paths:["history/"] },
  { n:2, title:"Theory", paths:["theory/"] },
  { n:3, title:"Theory 2", paths:["theory-2/","theory2/"] },
  { n:4, title:"Planning", paths:["planning/"] },
  { n:5, title:"Tropical Design and Green Architecture", paths:["tropical-design-green-architecture/","tropical-design-and-green-architecture/"] },
  { n:6, title:"Building Laws", paths:["building-laws/"] },
  { n:7, title:"ADSP Rule 7 & 8", paths:["adsp-rule-7-8/","adsp-rule-7-and-8/"] },
  {
    n:8,
    title:"Building Construction",
    paths:[
      "building-construction/",
      "building-constructuion/",
      "Building Construction/",
      "Building-Construction/",
      "building_construction/"
    ]
  },
  {
    n:9,
    title:"Building Materials",
    paths:[
      "building-materials/",
      "Building Materials/",
      "building_materials/"
    ]
  },
  { n:10, title:"Building Utilities", paths:["building-utilities/","utilities/"] },
  { n:11, title:"Structural Concepts", paths:["structural-concepts/"] },
  { n:12, title:"Structural Concepts Add Notes", paths:["structural-concepts-add-notes/","structural-concepts-notes/"] },
  { n:13, title:"Professional Practice", paths:["professional-practice/"] }
];

const grid = document.getElementById("grid");
const toast = document.getElementById("toast");

function showToast(message){
  toast.innerHTML = message;
  toast.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>toast.classList.remove("show"), 6000);
}

function makeCard(subject){
  const a = document.createElement("a");
  a.className = "card";
  a.href = subject.paths[0];
  a.dataset.paths = JSON.stringify(subject.paths);
  a.innerHTML = `
    <div class="num">${subject.n}</div>
    <div class="title">${subject.title}</div>
    <div class="status checking">Checking folder...</div>
  `;
  a.addEventListener("click", async (e)=>{
    e.preventDefault();
    const status = a.querySelector(".status");
    status.textContent = "Checking folder...";
    status.className = "status checking";

    const found = await findWorkingPath(subject.paths);
    if(found){
      status.textContent = "Opening reviewer";
      status.className = "status ok";
      window.location.href = found;
    }else{
      status.textContent = "Folder not found";
      status.className = "status missing";
      showToast(
        `Cannot open <strong>${subject.title}</strong> yet. Upload a folder at root named ` +
        subject.paths.map(p=>`<code>${p}</code>`).join(" or ") +
        ` and make sure it has <code>index.html</code>.`
      );
    }
  });
  return a;
}

async function pathExists(path){
  const clean = path.replace(/^\/+/,"");
  const tests = [clean + "index.html", clean + "cards.json"];
  for(const url of tests){
    try{
      const res = await fetch(url + "?v=" + Date.now(), { method:"GET", cache:"no-store" });
      if(res.ok) return true;
    }catch(e){}
  }
  return false;
}

async function findWorkingPath(paths){
  for(const p of paths){
    if(await pathExists(p)) return p;
  }
  return null;
}

async function markStatus(card, subject){
  const status = card.querySelector(".status");
  const found = await findWorkingPath(subject.paths);
  if(found){
    card.href = found;
    status.textContent = "Open reviewer";
    status.className = "status ok";
  }else{
    card.href = subject.paths[0];
    status.textContent = "Open when folder exists";
    status.className = "status checking";
  }
}

subjects.forEach(subject=>{
  const card = makeCard(subject);
  grid.appendChild(card);
  markStatus(card, subject);
});
</script>
</body>
</html>
